; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32c3]
; pioarduino platform provides Arduino ESP32 Core v3.x
; required by NetWizard (https://docs.netwizard.pro/docs/intro/installation)

; Platform
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
board = seeed_xiao_esp32c3
board_microros_distro = humble

; Build
build_flags = 
	-Iinclude
	-D NETWIZARD_USE_ASYNC_WEBSERVER=1
	; Keep development profile as default for this environment.
	-D BUILD_PROFILE=PROFILE_DEV
board_build.partitions = partitions/esp32c3_4mb_ota_spiffs.csv
extra_scripts = 
	pre:scripts/esp32_compat_patches.py
	post:scripts/esp32_compat_patches.py

; Dependency resolution
lib_ldf_mode = deep
lib_compat_mode = soft

; Libraries (pinned)
lib_deps = 
	ESP32Async/AsyncTCP@=3.4.10
	ESP32Async/ESPAsyncWebServer@=3.10.3
	adafruit/Adafruit NeoPixel@=1.15.4
	ayushsharma82/ElegantOTA@=3.1.7
	ayushsharma82/NetWizard@=1.2.2
	bblanchon/ArduinoJson@=7.4.3
	https://github.com/micro-ROS/micro_ros_platformio.git#cfee17faffaa532363b7151dd13af6a85c69d3c1

; Upload / Monitor
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200

[env:seeed_xiao_esp32c3_prod]
extends = env:seeed_xiao_esp32c3
build_flags =
	${env:seeed_xiao_esp32c3.build_flags}
	-U BUILD_PROFILE
	-D BUILD_PROFILE=PROFILE_PROD
